<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Activation</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: auto;">
<h2>Bonjour <span th:text="${username}"></span> 👋</h2>
<p>Merci de vous être inscrit sur <strong>Armin</strong>.</p>
<p>Votre code d'activation (valable <strong>15 minutes</strong>) :</p>
<div style="font-size: 36px; font-weight: bold; letter-spacing: 8px;
                background: #f4f4f4; padding: 20px; text-align: center;
                border-radius: 8px; margin: 20px 0;">
    <span th:text="${activation_code}"></span>
</div>
<p>Ou cliquez sur ce lien :
    <a th:href="${confirmationUrl}">Activer mon compte</a>
</p>
<p style="color: #999; font-size: 12px;">
    Si vous n'avez pas créé de compte, ignorez cet email.
</p>
</body>
</html>
